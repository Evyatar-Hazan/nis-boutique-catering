name: Cloudflare Usage Monitor

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-usage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check Cloudflare free-tier usage
        env:
          CLOUDFLARE_ACCOUNT_ID: 9b3262d42898067352168901679a4936
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node scripts/check-cloudflare-usage.mjs
