name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source:
        description: What triggered this deploy
        required: false
        default: manual

env:
  PNPM_VERSION: 9.15.9
  NODE_VERSION: '24'
  CLOUDFLARE_ACCOUNT_ID: 9b3262d42898067352168901679a4936
  CLOUDFLARE_ZONE_ID: c2a593125ed4fe46262ef7c46d97e3e3
  PUBLIC_SITE_PROJECT: nis-boutique-catering
  ADMIN_STUDIO_PROJECT: nis-content-studio

jobs:
  deploy:
    name: Build and deploy Pages projects
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install media tooling
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: pnpm validate

      - name: Build public site from published D1 and R2
        run: pnpm cloudflare:build:site
        env:
          CLOUDFLARE_CONTENT_API_ORIGIN: https://studio.nisboutiquecatering.com

      - name: Build admin studio
        run: pnpm cloudflare:build:admin
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy public site to Cloudflare Pages
        run: |
          deploy_pages() {
            local attempt=1
            until npx wrangler@3 pages deploy "$1" \
              --project-name="$2" \
              --branch=main \
              --commit-dirty=true; do
              if [ "$attempt" -ge 3 ]; then
                return 1
              fi
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          deploy_pages apps/frontend/nis-boutique-catering/dist "${PUBLIC_SITE_PROJECT}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy admin studio to Cloudflare Pages
        working-directory: apps/admin/nis-content-studio
        run: |
          deploy_pages() {
            local attempt=1
            until npx wrangler@3 pages deploy "$1" \
              --project-name="$2" \
              --branch=main \
              --commit-dirty=true; do
              if [ "$attempt" -ge 3 ]; then
                return 1
              fi
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          deploy_pages dist "${ADMIN_STUDIO_PROJECT}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Disable Cloudflare managed robots.txt
        run: |
          set -euo pipefail

          fetch_status="$(curl -sS -o /tmp/cloudflare-bot-management.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/bot_management" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")"

          if [ "${fetch_status}" = "401" ] || [ "${fetch_status}" = "403" ]; then
            echo "::warning::Skipping managed robots.txt disable: CLOUDFLARE_API_TOKEN needs Bot Management Write on zone ${CLOUDFLARE_ZONE_ID}."
            echo "ROBOTS_OWNERSHIP_ENFORCED=false" >> "${GITHUB_ENV}"
            exit 0
          fi

          if [ "${fetch_status}" != "200" ]; then
            echo "Unexpected Cloudflare GET /bot_management status: ${fetch_status}"
            cat /tmp/cloudflare-bot-management.json
            exit 1
          fi

          current_config="$(cat /tmp/cloudflare-bot-management.json)"

          payload="$(printf '%s' "${current_config}" | jq '
            .result
            | {
                ai_bots_protection,
                auto_update_model,
                bm_cookie_enabled,
                cf_robots_variant,
                content_bots_protection,
                crawler_protection,
                enable_js,
                fight_mode,
                is_robots_txt_managed,
                optimize_wordpress,
                sbfm_definitely_automated,
                sbfm_likely_automated,
                sbfm_static_resource_protection,
                sbfm_verified_bots,
                suppress_session_score
              }
            | with_entries(select(.value != null))
            | .is_robots_txt_managed = false
          ')"

          update_status="$(curl -sS -o /tmp/cloudflare-bot-management-update.json -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/bot_management" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${payload}")"

          if [ "${update_status}" = "401" ] || [ "${update_status}" = "403" ]; then
            echo "::warning::Cloudflare token can deploy Pages but cannot update Bot Management. Grant Bot Management Write to fully enforce repo-owned robots.txt."
            echo "ROBOTS_OWNERSHIP_ENFORCED=false" >> "${GITHUB_ENV}"
            exit 0
          fi

          if [ "${update_status}" != "200" ]; then
            echo "Unexpected Cloudflare PUT /bot_management status: ${update_status}"
            cat /tmp/cloudflare-bot-management-update.json
            exit 1
          fi

          echo "ROBOTS_OWNERSHIP_ENFORCED=true" >> "${GITHUB_ENV}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ env.CLOUDFLARE_ZONE_ID }}

      - name: Verify live robots.txt responses
        run: |
          check_robots() {
            local url="$1"
            local expected_line="$2"
            local body
            body="$(curl -fsS "${url}")"
            if printf '%s' "${body}" | grep -q "Cloudflare Managed content"; then
              if [ "${ROBOTS_OWNERSHIP_ENFORCED:-false}" = "true" ]; then
                echo "Cloudflare managed robots.txt is still active for ${url}"
                exit 1
              fi
              echo "::warning::Cloudflare managed robots.txt is still active for ${url}"
            fi
            if ! printf '%s' "${body}" | grep -Fq "${expected_line}"; then
              echo "Expected line not found in ${url}: ${expected_line}"
              printf '%s\n' "${body}"
              exit 1
            fi
          }

          check_robots "https://nisboutiquecatering.com/robots.txt" "Sitemap: https://nisboutiquecatering.com/sitemap.xml"
          check_robots "https://studio.nisboutiquecatering.com/robots.txt" "Disallow: /"
