name: Legacy Google Backup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
      - run: sudo apt-get update && sudo apt-get install -y webp
      - run: pnpm install --frozen-lockfile
      - name: Sync exact remote snapshot and media
        run: pnpm content:sync
        env:
          CONTENT_SYNC_REQUIRE_REMOTE: true
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: 101lO26iC3FzIJ7LdsGPCt1oJDR6RBHIkmeqcJ_Peyzk
      - name: Create and verify credential-free backup
        id: backup
        run: |
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"
          BACKUP_TIMESTAMP="${timestamp}" node scripts/create-legacy-google-backup.mjs "$RUNNER_TEMP/legacy-google"
          node scripts/verify-legacy-google-backup.mjs "$RUNNER_TEMP/legacy-google/${timestamp}"
        env:
          GOOGLE_DRIVE_FOLDER_ID: 1HSTXq2aJkRj4CrPcNeNDx4EpAHQsUWDv
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: 101lO26iC3FzIJ7LdsGPCt1oJDR6RBHIkmeqcJ_Peyzk
      - uses: actions/upload-artifact@v4
        with:
          name: legacy-google-${{ steps.backup.outputs.timestamp }}
          path: ${{ runner.temp }}/legacy-google/${{ steps.backup.outputs.timestamp }}
          if-no-files-found: error
          retention-days: 90
